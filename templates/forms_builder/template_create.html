{% extends 'base.html' %}
{% block title %}Criar Template de Formulário{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 800px;">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'forms:templates' %}">Templates</a></li>
            <li class="breadcrumb-item active">Criar Novo</li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-dark text-white p-4 rounded-top-4">
            <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Criar Novo Template</h4>
            <small class="text-light opacity-75">Defina o nome, categoria e descrição. Depois adicione as perguntas.</small>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">Nome do Template *</label>
                    <input type="text" class="form-control" id="name" name="name" required
                        placeholder="Ex: Avaliação Psicossocial NR-01">
                </div>
                <div class="mb-3">
                    <label for="category" class="form-label fw-semibold">Categoria</label>
                    <select class="form-select" id="category" name="category">
                        {% for key, label in category_choices %}
                        <option value="{{ key }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-4">
                    <label for="description" class="form-label fw-semibold">Descrição</label>
                    <textarea class="form-control" id="description" name="description" rows="3"
                        placeholder="Breve descrição do objetivo deste template..."></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary rounded-pill px-4 fw-semibold">
                        <i class="bi bi-check-lg me-2"></i>Criar Template
                    </button>
                    <a href="{% url 'forms:templates' %}" class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
