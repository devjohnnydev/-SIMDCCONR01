{% extends 'base.html' %}

{% block title %}Novo Ticket - Suporte{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <h1 class="h2 mb-4"><i class="bi bi-chat-dots-fill"></i> Novo Ticket</h1>
            
            <div class="card p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="subject" class="form-label">Assunto</label>
                        <input type="text" name="subject" id="subject" class="form-control" placeholder="E.g. Duvida sobre faturamento" required>
                    </div>
                    <div class="mb-3">
                        <label for="content" class="form-label">Mensagem</label>
                        <textarea name="content" id="content" class="form-control" rows="5" placeholder="Descreva seu problema ou dúvida..." required></textarea>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary rounded-pill">
                            <i class="bi bi-send-fill me-2"></i> Abrir Ticket
                        </button>
                        <a href="{% url 'support:ticket_list' %}" class="btn btn-outline-secondary rounded-pill">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
